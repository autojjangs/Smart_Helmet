<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>목적지 검색</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0; padding: 16px; background: #f4f5f7; color: #1a1a1a;
        }
        h1 { font-size: 20px; margin: 8px 0 16px; }
        .search-box { display: flex; gap: 8px; margin-bottom: 16px; }
        #keyword {
            flex: 1; padding: 14px; font-size: 16px;
            border: 1px solid #ccc; border-radius: 10px;
        }
        #searchBtn {
            padding: 14px 18px; font-size: 16px; border: none;
            border-radius: 10px; background: #2962ff; color: #fff; font-weight: 600;
        }
        #searchBtn:active { background: #0039cb; }
        .result {
            background: #fff; border-radius: 10px; padding: 14px;
            margin-bottom: 10px; border: 1px solid #e0e0e0;
        }
        .result:active { background: #eef3ff; }
        .result .name { font-size: 16px; font-weight: 600; }
        .result .addr { font-size: 13px; color: #666; margin-top: 4px; }
        #status { margin-top: 12px; font-size: 14px; color: #2962ff; }
        .empty { color: #999; font-size: 14px; }
    </style>
</head>
<body>
    <h1>🛵 목적지 검색</h1>

    <div class="search-box">
        <input type="text" id="keyword" placeholder="목적지를 검색하세요 (예: 행복관)"
               autocomplete="off">
        <button id="searchBtn">검색</button>
    </div>

    <div id="results"></div>
    <div id="status"></div>

    <script>
        const keywordInput = document.getElementById("keyword");
        const searchBtn = document.getElementById("searchBtn");
        const resultsDiv = document.getElementById("results");
        const statusDiv = document.getElementById("status");

        async function doSearch() {
            const keyword = keywordInput.value.trim();
            if (!keyword) return;

            statusDiv.textContent = "검색 중...";
            resultsDiv.innerHTML = "";

            try {
                const res = await fetch(`/search?keyword=${encodeURIComponent(keyword)}`);
                const data = await res.json();
                statusDiv.textContent = "";

                if (data.error) {
                    statusDiv.textContent = data.error;
                    return;
                }
                if (!data.results.length) {
                    resultsDiv.innerHTML = '<div class="empty">검색 결과가 없습니다.</div>';
                    return;
                }

                data.results.forEach(poi => {
                    const div = document.createElement("div");
                    div.className = "result";
                    div.innerHTML =
                        `<div class="name">${poi.name}</div>` +
                        `<div class="addr">${poi.address}</div>`;
                    div.onclick = () => selectDestination(poi);
                    resultsDiv.appendChild(div);
                });
            } catch (e) {
                statusDiv.textContent = "검색 중 오류가 발생했습니다.";
            }
        }

        async function selectDestination(poi) {
            statusDiv.textContent = "목적지 설정 중...";
            try {
                const res = await fetch("/destination", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(poi),
                });
                const data = await res.json();
                if (data.ok) {
                    resultsDiv.innerHTML = "";
                    statusDiv.textContent = "✅ " + data.message;
                } else {
                    statusDiv.textContent = data.error || "설정 실패";
                }
            } catch (e) {
                statusDiv.textContent = "목적지 설정 중 오류가 발생했습니다.";
            }
        }

        searchBtn.onclick = doSearch;
        keywordInput.addEventListener("keydown", e => {
            if (e.key === "Enter") doSearch();
        });
    </script>
</body>
</html>
