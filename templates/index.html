<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>스마트 헬멧 — 목적지 설정</title>
  <style>
    body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px;
           background: #f4f6f8; color: #1a1a1a; }
    h1 { font-size: 20px; margin: 0 0 16px; }
    .row { display: flex; gap: 8px; margin-bottom: 14px; }
    input { flex: 1; padding: 12px; font-size: 16px; border: 1px solid #cdd3da;
            border-radius: 10px; }
    button { padding: 12px 16px; font-size: 16px; font-weight: 700; border: 0;
             border-radius: 10px; background: #2563eb; color: #fff; }
    button:disabled { background: #b9c2cf; }
    .card { background: #fff; border-radius: 12px; padding: 14px 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 10px; }
    .name { font-size: 16px; font-weight: 700; }
    .addr { font-size: 13px; color: #6b7280; margin-top: 2px; }
    .pick { margin-top: 10px; width: 100%; background: #10b981; }
    .msg { padding: 12px 14px; border-radius: 10px; margin-bottom: 14px;
           font-weight: 700; display: none; }
    .msg.ok   { background: #d6f5d6; color: #157a15; display: block; }
    .msg.err  { background: #ffe0e0; color: #b91c1c; display: block; }
    .status { font-size: 13px; color: #374151; margin-top: 6px; }
    .dot { display:inline-block; width:9px; height:9px; border-radius:50%;
           background:#bbb; margin-right:6px; vertical-align:middle; }
    .dot.on { background:#10b981; }
  </style>
</head>
<body>
  <h1>🪖 스마트 헬멧 — 목적지 설정</h1>

  <div id="msg" class="msg"></div>

  <div class="row">
    <input id="kw" placeholder="장소 검색 (예: 행복관)" autocomplete="off">
    <button id="btnSearch" onclick="doSearch()">검색</button>
  </div>

  <div id="results"></div>

  <div class="card">
    <span id="dot" class="dot"></span>
    <span id="navState">내비게이션 대기 중</span>
    <div class="status" id="routeState"></div>
  </div>

<script>
function showMsg(text, ok) {
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg ' + (ok ? 'ok' : 'err');
}

async function doSearch() {
  const kw = document.getElementById('kw').value.trim();
  const box = document.getElementById('results');
  box.innerHTML = '';
  if (!kw) { showMsg('검색어를 입력하세요.', false); return; }

  try {
    const res = await fetch('/search?keyword=' + encodeURIComponent(kw));
    const data = await res.json();
    if (data.error) { showMsg(data.error, false); return; }
    if (!data.results.length) { showMsg('검색 결과가 없습니다.', false); return; }
    document.getElementById('msg').className = 'msg';

    data.results.forEach(function(r) {
      const div = document.createElement('div');
      div.className = 'card';
      div.innerHTML =
        '<div class="name">' + r.name + '</div>' +
        '<div class="addr">' + (r.address || '') + '</div>';
      const b = document.createElement('button');
      b.className = 'pick';
      b.textContent = '여기로 설정 (내비 시작)';
      b.onclick = function() { confirmDest(r); };
      div.appendChild(b);
      box.appendChild(div);
    });
  } catch (e) {
    showMsg('검색 요청 실패: ' + e, false);
  }
}

async function confirmDest(r) {
  try {
    const res = await fetch('/destination', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: r.name, lon: r.lon, lat: r.lat })
    });
    const data = await res.json();
    if (data.ok) {
      showMsg(data.message, true);
      document.getElementById('results').innerHTML = '';
    } else {
      showMsg(data.error || '설정 실패', false);
    }
  } catch (e) {
    showMsg('목적지 설정 실패: ' + e, false);
  }
}

async function poll() {
  try {
    const res = await fetch('/status');
    const d = await res.json();
    document.getElementById('dot').className = 'dot' + (d.nav_running ? ' on' : '');
    document.getElementById('navState').textContent =
      d.nav_running ? '내비게이션 실행 중' : '내비게이션 대기 중';

    const route = d.navigation && d.navigation.route;
    if (route) {
      document.getElementById('routeState').textContent =
        '안내 지점 ' + route.current_index + ' / ' + route.total_points +
        ' · 총 거리 ' + route.total_distance + 'm';
    } else {
      document.getElementById('routeState').textContent = '';
    }
  } catch (e) { /* 무시 */ }
}
setInterval(poll, 1500);
poll();
</script>
</body>
</html>
